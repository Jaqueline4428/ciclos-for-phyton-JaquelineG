<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alerta Dinámica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

  <button id="btnMostrar" class="btn btn-primary">
    Mostrar Alerta
  </button>

  <div id="alerta" class="alert alert-success mt-3 d-none">
    Mensaje de alerta
  </div>

  <script>
    const btn = document.getElementById("btnMostrar");
    const alerta = document.getElementById("alerta");

    btn.addEventListener("click", () => {

      // 1. Obtener hora exacta
      const ahora = new Date();
      const hora = ahora.toLocaleTimeString();

      // 2. Cambiar contenido del mensaje
      alerta.textContent = "Botón presionado a las: " + hora;

      // 3. Mostrar alerta quitando d-none
      alerta.classList.remove("d-none");

      // 4. Auto ocultado después de 3 segundos
      setTimeout(() => {
        alerta.classList.add("d-none");
      }, 3000);

    });
  </script>

</body>
</html>
